---
# vars file for base

local_dir: "{{ ansible_env.HOME }}/.local"

local_bin_dir: "{{ local_dir }}/bin/"

config_dir: "{{ lookup('env', 'XDG_CONFIG_HOME') | default(lookup('env', 'HOME') + '/.config', True) }}"

bash_config_dir: "{{ lookup('env', 'XDG_CONFIG_HOME') | default(lookup('env', 'HOME') + '/.config', True) }}/bash_config"

bash_config_dropins_dir: "{{ ansible_env.HOME }}/.bashrc.d/"
